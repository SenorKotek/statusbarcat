name: Build and Release ayabar

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app bundle
        run: ./scripts/package_app.sh

      - name: Zip app
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/ayabar.app dist/ayabar.app.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ayabar-app
          path: dist/ayabar.app.zip

      - name: Update prebuilt app in repository
        if: github.ref == 'refs/heads/main'
        run: |
          cp dist/ayabar.app.zip prebuilt/ayabar.app.zip

      - name: Commit prebuilt app
        if: github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(prebuilt): refresh ayabar.app.zip"
          file_pattern: prebuilt/ayabar.app.zip

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ayabar.app.zip
          generate_release_notes: true
