name: Build and Release ayabar

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build app bundle
        run: ./scripts/package_app.sh

      - name: Zip app
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/ayabar.app dist/ayabar.app.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ayabar-app
          path: dist/ayabar.app.zip

      - name: Update prebuilt app in repository
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p prebuilt
          cp dist/ayabar.app.zip prebuilt/ayabar.app.zip

      - name: Commit and push prebuilt app
        if: github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prebuilt/ayabar.app.zip
          if git diff --cached --quiet; then
            echo "No prebuilt changes to commit"
            exit 0
          fi
          git commit -m "chore(prebuilt): refresh ayabar.app.zip"
          git push

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ayabar.app.zip
          generate_release_notes: true
